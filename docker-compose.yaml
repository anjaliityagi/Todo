version: "3.6"

services:
  db:
    container_name: postgresDb
    image: postgres:16
    ports:
      - "5434:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: local
      POSTGRES_PASSWORD: local
      POSTGRES_DB: mercury-dev
    restart: unless-stopped